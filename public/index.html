<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UoEm | UoEm Student's Voice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">
            <img src="/assets/uoem-logo.jpg" alt="University of Embu logo" />
          </div>
          <div>
            <p class="eyebrow">University of Embu</p>
            <h1>UoEm Student's Voice</h1>
          </div>
        </div>

        <nav class="topnav" id="topnav">
          <button class="nav-link" data-route="landing">Home</button>
          <button class="nav-link" data-route="submit">Submit</button>
          <button class="nav-link" data-route="track">Track</button>
          <button class="nav-link" data-route="student-dashboard">Student Dashboard</button>
          <button class="nav-link" data-route="admin-dashboard">Admin Dashboard</button>
          <button class="nav-link" data-route="auth" id="authNavButton">Login</button>
          <button class="nav-link danger hidden" id="logoutButton">Logout</button>
        </nav>

        <button class="mobile-menu" id="mobileMenuButton" aria-label="Toggle navigation">
          <i class="fa-solid fa-bars"></i>
        </button>
      </header>

      <main id="app"></main>
    </div>

    <div class="toast-stack" id="toastStack"></div>
    <div class="loading-overlay hidden" id="loadingOverlay">
      <div class="loader-card">
        <div class="loader-ring"></div>
        <p>Loading your campus feedback workspace...</p>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
  </html>
